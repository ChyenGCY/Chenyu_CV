name: Build, Publish & Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-latex-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Compile PDFs
        run: |
          set -e
          docker run --rm -v "$PWD":/docs texlive/texlive:latest \
            /bin/bash -lc '
              cd /docs
              # If you prefer latexmk and it’s available in the image, uncomment:
              # latexmk -pdf -interaction=nonstopmode CV-short.tex
              # latexmk -pdf -interaction=nonstopmode resume.tex

              # Fallback to pdflatex x2 for stable references
              pdflatex -interaction=nonstopmode CV-short.tex || true
              pdflatex -interaction=nonstopmode CV-short.tex
              pdflatex -interaction=nonstopmode resume.tex || true
              pdflatex -interaction=nonstopmode resume.tex
            '
          # mkdir -p public
          # Copy any produced PDFs to public for Pages
          # find . -maxdepth 1 -name "*.pdf" -print -exec cp {} public/ \;

      - name: Prepare Public Folder
        run: |
          mkdir -p public
          cp CV.pdf public/ 2>/dev/null || :
          cp resume.pdf public/ 2>/dev/null || :

      # 1. Upload as an Artifact (Internal GitHub storage)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF_files
          path: |
            CV.pdf
            resume.pdf

      # 2. Update GitHub Pages (Your live URL)
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
          publish_branch: gh-pages

      # 3. Create/Update a "Latest" Release
      - name: Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: Latest LaTeX Build
          body: "Auto-generated build from the latest push."
          files: |
            ./CV.pdf
            ./resume.pdf
          prerelease: true # Keeps it marked as a draft/rolling build
